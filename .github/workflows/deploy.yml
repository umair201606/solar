name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to GCP
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 34.18.23.219 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no ubuntu@34.18.23.219 "
            cd /var/www/solar &&
            git pull origin main &&
            composer install --no-dev --optimize-autoloader &&
            npm ci &&
            npm run build:ssr &&
            php artisan migrate --force &&
            ( grep -q '^VAPID_PUBLIC_KEY=.' .env || php artisan webpush:vapid | grep -E '^VAPID_(PUBLIC|PRIVATE)_KEY=' >> .env ; grep -q '^VAPID_SUBJECT=' .env || echo 'VAPID_SUBJECT=mailto:info@solarkon.com' >> .env ; true ) &&
            php artisan config:cache &&
            php artisan route:cache &&
            sudo systemctl restart nginx &&
            sudo systemctl restart solar-ssr
          "
